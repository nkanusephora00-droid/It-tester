spring:
  application:
    name: it-access-manager
  
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/itaccess}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  
  jpa:
    hibernate:
      ddl-auto: update

server:
  port: ${SERVER_PORT:8000}

app:
  cors:
    allowed-origins: https://your-frontend.onrender.com,http://localhost:3000,http://127.0.0.1:3000
  
  jwt:
    secret: ${JWT_SECRET:please-change-this-in-production-use-a-secure-random-key-at-least-256-bits}
    expiration: 1800000

logging:
  level:
    com.itaccess: DEBUG
